#         + OLMo-midtraining-mix-0925-ingredient1-100B.txt
#
# The README lists individual reasoning traces (qwq 1.87%, gemini 0.25%, etc.) as
# separate rows. In the dolmino dataset, these are BUNDLED into:
#   general_reasoning_mix = r1 + qwq + gemini + llamanemotron + openthoughts2 = 6.49%
#   program_verifiable    = verifiable-gpt41 + verifiable-o4mini              = 0.16%
#   wiki_to_rcqa-part1/2  = wiki_to_rcqa (split into 2 parts)                = 3.0%
#
# All weights sum to 1.0 (= 100%).

